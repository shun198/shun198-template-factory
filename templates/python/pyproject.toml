[project]
name = "__PROJECT_SLUG__"
version = "0.1.0"
description = "Python starter generated from template-factory"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
  "typer>=0.16.0",
]

[dependency-groups]
dev = [
  "mypy>=1.11.0",
  "pytest>=8.3.0",
  "ruff>=0.6.9",
]

[project.scripts]
__PROJECT_SLUG__ = "template_app.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py314"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.14"
strict = true
packages = ["template_app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
