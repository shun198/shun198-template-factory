name: python-template-ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version-file: './pyproject.toml'
          enable-cache: true

      - name: Setup
        run: make setup

      - name: Lint
        run: make lint

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: make test
