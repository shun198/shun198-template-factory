name: golang-template-ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
          args: ./...

      - name: Setup
        run: make setup

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: make test
