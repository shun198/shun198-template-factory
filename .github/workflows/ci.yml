name: template-factory-ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate shell scripts
        run: |
          bash -n scripts/create-template.sh
          bash -n scripts/validate-template.sh

      - name: Validate repository structure
        run: make validate

  python-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/python
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: '3.14'

      - name: Setup
        run: make setup

      - name: Lint
        run: make lint

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: make test

  golang-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/golang
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Setup
        run: make setup

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: make test
