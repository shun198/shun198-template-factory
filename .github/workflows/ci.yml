name: template-factory-ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate shell scripts
        run: |
          bash -n scripts/create-template.sh
          bash -n scripts/validate-template.sh

      - name: Validate repository structure
        run: make validate

  nextjs-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/nextjs
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: templates/nextjs/package.json
          cache: pnpm
          cache-dependency-path: templates/nextjs/pnpm-lock.yaml

      - name: Setup
        run: make setup

      - name: Lint
        run: make lint

      - name: Format check
        run: pnpm exec prettier --check .

      - name: Test
        run: make test

      - name: Build
        run: make build
