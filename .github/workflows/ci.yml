name: template-factory-ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate shell scripts
        run: |
          bash -n scripts/create-template.sh
          bash -n scripts/validate-template.sh

      - name: Validate repository structure
        run: make validate

  golang-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/golang
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: templates/golang/go.mod

      - name: Setup
        run: make setup

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: templates/golang
          args: ./...

      - name: Lint
        run: make lint

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: make test

  terraform-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env_dir:
          - templates/terraform-google-cloud/envs/dev
          - templates/terraform-google-cloud/envs/prod
    defaults:
      run:
        working-directory: ${{ matrix.env_dir }}
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../..

      - name: Terraform validate
        run: terraform validate

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: templates/terraform-google-cloud

  nestjs-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/nestjs
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: templates/nestjs/package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: templates/nestjs/package.json
          cache: pnpm
          cache-dependency-path: templates/nestjs/pnpm-lock.yaml

      - name: Setup
        run: make setup

      - name: Lint
        run: make lint

      - name: Format check
        run: pnpm exec prettier --check .

      - name: Test
        run: make test

      - name: Build
        run: pnpm run build

  python-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/python
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: templates/python/.python-version

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Setup
        run: make setup

      - name: Lint
        run: make lint

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: make test
