name: template-factory-ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate shell scripts
        run: |
          bash -n scripts/create-template.sh
          bash -n scripts/validate-template.sh

      - name: Validate repository structure
        run: make validate

  python-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/python
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version-file: './templates/python/uv.lock'
          enable-cache: true

      - name: Setup
        run: make setup

      - name: Lint
        run: make lint

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: make test
