name: template-factory-ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          bash -n scripts/create-template.sh
          bash -n scripts/validate-template.sh

      - name: Validate repository structure
        run: make validate

  python-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/python
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.14'

      - name: Setup
        run: make setup

      - name: Lint
        run: make lint

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: make test

  golang-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/golang
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Setup
        run: make setup

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: make test

  nestjs-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/nestjs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup
        run: make setup

      - name: Lint
        run: make lint

      - name: Format check
        run: pnpm exec prettier --check .

      - name: Test
        run: make test

  nextjs-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/nextjs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup
        run: make setup

      - name: Lint
        run: make lint

      - name: Format check
        run: pnpm exec prettier --check .

      - name: Test
        run: make test

  terraform-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env_dir:
          - templates/terraform-google-cloud/envs/dev
          - templates/terraform-google-cloud/envs/prod
    defaults:
      run:
        working-directory: ${{ matrix.env_dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../..

      - name: Terraform validate
        run: terraform validate

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: templates/terraform-google-cloud
