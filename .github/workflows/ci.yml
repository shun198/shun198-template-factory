name: template-factory-ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate shell scripts
        run: |
          bash -n scripts/create-template.sh
          bash -n scripts/validate-template.sh

      - name: Validate repository structure
        run: make validate

  terraform-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env_dir:
          - templates/terraform-google-cloud/envs/dev
          - templates/terraform-google-cloud/envs/prod
    defaults:
      run:
        working-directory: ${{ matrix.env_dir }}
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../..

      - name: Terraform validate
        run: terraform validate

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: templates/terraform-google-cloud

  python-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/python
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: templates/python/.python-version

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Setup
        run: make setup

      - name: Lint
        run: make lint

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: make test
